<section class="ux-summary-bar" [class.ux-summary-bar--dense]="dense()">
  @if (eyebrow() || title() || subhead()) {
    <header class="ux-summary-bar__head">
      <div class="ux-summary-bar__copy">
        @if (eyebrow()) {
          <p class="ux-summary-bar__eyebrow">{{ eyebrow() }}</p>
        }
        @if (title()) {
          <h2>{{ title() }}</h2>
        }
        @if (subhead()) {
          <p class="ux-summary-bar__subhead">{{ subhead() }}</p>
        }
      </div>
      <div class="ux-summary-bar__actions">
        <ng-content select="[summary-bar-actions]"></ng-content>
      </div>
    </header>
  }

  <div class="ux-summary-bar__grid" [style.gridTemplateColumns]="gridTemplateColumns()">
    <ng-content></ng-content>
  </div>
</section>
